name: beltech
description: Personal management app with clean architecture and glassmorphism UI.
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  local_auth: ^2.3.0
  fl_chart: ^0.69.2
  supabase_flutter: ^2.10.4
  http: ^1.6.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.0
  flutter_sms_inbox: ^1.0.4
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  intl: ^0.20.2
  flutter_markdown: ^0.7.7+1
  go_router: ^17.1.0
  connectivity_plus: ^6.1.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.1
  build_runner: ^2.4.12
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - shorebird.yaml

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/beltech_logo.jpeg
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/beltech_logo.jpeg
  web:
    generate: true
    image_path: assets/branding/beltech_logo.jpeg
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/branding/beltech_logo.jpeg
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/beltech_logo.jpeg
