build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ReturnCount:
    active: false
  ThrowsCount:
    active: false

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
