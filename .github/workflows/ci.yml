name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Detekt static analysis ─────────────────────────────────────────────
      - name: Run Detekt
        run: ./gradlew detekt --stacktrace
        continue-on-error: false

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ── Debug APK build ────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Upload APK artifact ────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Upload test results on failure ────────────────────────────────────
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  release-apk:
    name: Build & Publish Release APK to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      # ── Publish to OTA folder on GitHub Pages ─────────────────────────────
      - name: Copy APK to OTA folder
        run: |
          mkdir -p ota
          cp app/build/outputs/apk/release/app-release-unsigned.apk ota/lifeOS-latest.apk
          echo "{ \"version\": \"$(date +'%Y%m%d.%H%M')\", \"apk\": \"lifeOS-latest.apk\", \"buildDate\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\" }" > ota/release.json

      - name: Deploy OTA folder to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ota
          destination_dir: ota
          keep_files: true
